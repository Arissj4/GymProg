services:
  frontend:
    build: ./front-end
    container_name: myprog-frontend
    expose:
      - "5173"
    develop:
      watch:
        - action: sync
          path: ./front-end
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./front-end/package.json
        - action: rebuild
          path: ./front-end/package-lock.json

  backend:
    build: ./back-end
    container_name: myprog-backend
    command: npm run dev
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: myprog
      SESSION_SECRET: dev-only-long-random-secret-change-me
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    develop:
      watch:
        - action: sync
          path: ./back-end
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./back-end/package.json
        - action: rebuild
          path: ./back-end/package-lock.json
        - action: sync+restart
          path: ./back-end/.env
          target: /app/.env

  db:
    image: postgres:18-alpine
    container_name: myprog-db
    environment:
      POSTGRES_DB: myprog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back-end/db-init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myprog"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:alpine
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  postgres_data: